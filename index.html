<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>➤ 𝕊𝔸ℂℍ𝕀ℕ 𝕊ℍ𝔸ℝ𝕄𝔸 | Professional Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --glow: #00d2ff; --bg: #010101; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; height: 100%; width: 100%; }
        
        #canvas-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }

        /* --- AUTH BOX DESIGN --- */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .auth-box { background: rgba(15, 15, 15, 0.95); border: 2px solid var(--glow); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 40px rgba(0, 210, 255, 0.15); box-sizing: border-box; }
        .auth-box h2 { color: var(--glow); margin-top: 0; letter-spacing: 1px; }
        .auth-box p { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--glow); outline: none; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        .auth-btn { width: 100%; padding: 14px; background: var(--glow); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; margin-top: 10px; font-size: 1.1rem; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .auth-btn:active { transform: scale(0.95); background: #fff; }
        
        .auth-toggle { margin-top: 20px; color: #aaa; font-size: 0.9rem; cursor: pointer; user-select: none; }
        .auth-toggle span { color: var(--glow); font-weight: bold; }

        /* --- LOGOUT --- */
        #logout-area { display: none; position: fixed; top: 15px; right: 15px; z-index: 2000; }
        .logout-btn { background: #ff4b4b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- MAIN UI (HIDDEN) --- */
        #main-content { display: none; text-align: center; padding-top: 80px; }
        .batch-card { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 20px; margin: 20px auto; width: 90%; max-width: 400px; border-left: 5px solid var(--glow); }

        /* Loading Spinner */
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="canvas-stars"></canvas>

    <div id="logout-area">
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div id="auth-container" class="auth-container">
        <div class="auth-box">
            <h2 id="title">🔐 लॉगिन</h2>
            <p id="subtitle">अपना ईमेल और पासवर्ड डालें</p>
            
            <div id="inputs">
                <input type="email" id="email" placeholder="Email Address" autocomplete="email">
                <div id="reg-extra" style="display: none;">
                    <input type="text" id="mobile" placeholder="Mobile Number" autocomplete="tel">
                </div>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                
                <div id="otp-area" style="display: none;">
                    <input type="text" id="otp" placeholder="6-Digit OTP Code">
                </div>
            </div>

            <button class="auth-btn" id="action-btn" onclick="processAuth()">प्रवेश करें</button>
            
            <div class="auth-toggle" onclick="toggleMode()">
                <span id="toggle-msg">नया अकाउंट बनाने के लिए <span>यहाँ क्लिक करें</span></span>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1 style="color:var(--glow)">स्वागत है, सचिन!</h1>
        <div class="batch-card">
            <h3>SSC CGL Foundation</h3>
            <p>स्टाफ सिलेक्शन कमीशन स्पेशल बैच</p>
            <button class="auth-btn" style="width:auto; padding:10px 30px;">Buy Now</button>
        </div>
        <p style="color:#555">बाकी बैचेस जल्द ही यहाँ अपडेट होंगे...</p>
    </div>

    <script>
        const SB_URL = "https://jnhkojxsckdgsvaagfhc.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuaGtovanhzY2tkZ3N2YWFnZmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MDIxMDYsImV4cCI6MjA5NDk3ODEwNn0.hPBHq55bv9F0g9-mmgukyYZdZc-YM_Ye4B7IPsGdles";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
        } catch(e) {
            console.error("Supabase load failed");
        }

        let isLogin = true;
        let otpSent = false;

        function toggleMode() {
            isLogin = !isLogin;
            otpSent = false;
            document.getElementById('title').innerText = isLogin ? "🔐 लॉगिन" : "📝 रजिस्ट्रेशन";
            document.getElementById('reg-extra').style.display = isLogin ? "none" : "block";
            document.getElementById('otp-area').style.display = "none";
            document.getElementById('action-btn').innerText = isLogin ? "प्रवेश करें" : "OTP भेजें";
            document.getElementById('toggle-msg').innerHTML = isLogin ? "नया अकाउंट बनाने के लिए <span>यहाँ क्लिक करें</span>" : "पहले से अकाउंट है? <span>लॉगिन करें</span>";
        }

        async function processAuth() {
            const btn = document.getElementById('action-btn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const otp = document.getElementById('otp').value.trim();

            if(!email || !password) return alert("कृपया सभी जानकारी भरें!");

            btn.classList.add('loading');
            btn.innerText = "कृपया रुकें...";

            if (isLogin) {
                // LOGIN LOGIC
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("लॉगिन फेल: " + error.message);
                    btn.classList.remove('loading');
                    btn.innerText = "प्रवेश करें";
                } else {
                    showApp();
                }
            } else {
                // REGISTER LOGIC
                if (!otpSent) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) {
                        alert("रजिस्ट्रेशन फेल: " + error.message);
                        btn.classList.remove('loading');
                    } else {
                        alert("OTP आपके ईमेल पर भेज दिया गया है!");
                        otpSent = true;
                        document.getElementById('otp-area').style.display = "block";
                        btn.classList.remove('loading');
                        btn.innerText = "OTP वेरिफाई करें";
                    }
                } else {
                    const { error } = await supabase.auth.verifyOtp({ email, token: otp, type: 'signup' });
                    if (error) {
                        alert("गलत OTP! फिर से चेक करें।");
                        btn.classList.remove('loading');
                    } else {
                        showApp();
                    }
                }
            }
        }

        async function showApp() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('logout-area').style.display = 'block';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // Star background logic
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = [];
        for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.2});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(draw);
        }
        draw();

        // Check if user is already logged in
        window.onload = showApp;
    </script>
</body>
</html>
